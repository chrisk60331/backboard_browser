{% extends "base.html" %}

{% block title %}Assistants - Backboard Browser{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Assistants</h1>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Manage your AI assistants</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                Create Assistant
            </button>
            <!-- View Mode Selector -->
            <div class="flex items-center space-x-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-1">
                <button onclick="setViewMode('icons')" id="viewmode-icons" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Icons">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </button>
                <button onclick="setViewMode('list')" id="viewmode-list" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="List">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                </button>
                <button onclick="setViewMode('columns')" id="viewmode-columns" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Columns">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
                </button>
                <button onclick="setViewMode('gallery')" id="viewmode-gallery" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Gallery">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <div class="px-4 py-5 sm:p-6">
            <div class="mb-4 space-y-3">
                <input type="text" id="searchInput" placeholder="Search assistants..." class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                <div class="flex items-center space-x-2">
                    <div id="loadingSpinner" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-blue-600 dark:border-blue-400"></div>
                    <span id="assistantCount" class="text-sm text-gray-600 dark:text-gray-400"></span>
                </div>
            </div>
            <div id="assistantsContainer">
                <!-- Assistants will be loaded here based on view mode -->
            </div>
        </div>
    </div>
</div>

<!-- Create/Edit Modal -->
<div id="assistantModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white dark:bg-gray-800">
        <div class="mt-3">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4" id="modalTitle">Create Assistant</h3>
            <form id="assistantForm">
                <input type="hidden" id="assistantId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Name</label>
                    <input type="text" id="assistantName" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Model</label>
                    <input type="text" id="assistantModel" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">System Prompt</label>
                    <textarea id="assistantPrompt" rows="4" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="hideModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
let assistants = [];
let currentViewMode = 'list';
let sortColumn = 'name';
let sortDirection = 'asc';
let selectedModel = '';
const PAGE_KEY = 'viewmode_assistants';

// View Mode Functions
function getViewMode() {
    return localStorage.getItem(PAGE_KEY) || 'list';
}

function setViewMode(mode) {
    currentViewMode = mode;
    localStorage.setItem(PAGE_KEY, mode);
    updateViewModeButtons();
    renderAssistants();
}

function updateViewModeButtons() {
    const modes = ['icons', 'list', 'columns', 'gallery'];
    modes.forEach(mode => {
        const btn = document.getElementById(`viewmode-${mode}`);
        if (btn) {
            if (mode === currentViewMode) {
                btn.classList.add('bg-white', 'dark:bg-gray-600', 'shadow-sm');
                btn.classList.remove('hover:bg-gray-200', 'dark:hover:bg-gray-600');
            } else {
                btn.classList.remove('bg-white', 'dark:bg-gray-600', 'shadow-sm');
                btn.classList.add('hover:bg-gray-200', 'dark:hover:bg-gray-600');
            }
        }
    });
}

// Sort Functions
function sortBy(column) {
    if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
        sortColumn = column;
        sortDirection = 'asc';
    }
    renderAssistants();
}

function getSortIndicator(column) {
    if (sortColumn !== column) return '';
    return sortDirection === 'asc' ? '↑' : '↓';
}

function sortData(data) {
    const numericColumns = ['_threadCount', '_memoryCount'];
    return [...data].sort((a, b) => {
        let aVal = a[sortColumn];
        let bVal = b[sortColumn];
        
        if (aVal == null) aVal = numericColumns.includes(sortColumn) ? -1 : '';
        if (bVal == null) bVal = numericColumns.includes(sortColumn) ? -1 : '';
        
        let comparison;
        if (numericColumns.includes(sortColumn)) {
            comparison = Number(aVal) - Number(bVal);
        } else {
            comparison = String(aVal).localeCompare(String(bVal));
        }
        return sortDirection === 'asc' ? comparison : -comparison;
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadAssistants() {
    const spinner = document.getElementById('loadingSpinner');
    const countEl = document.getElementById('assistantCount');
    const container = document.getElementById('assistantsContainer');
    
    spinner.classList.remove('hidden');
    countEl.textContent = 'Loading assistants...';
    container.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 dark:border-blue-400"></div><span class="ml-3 text-gray-600 dark:text-gray-400">Loading assistants...</span></div>';
    
    try {
        const response = await fetch('/api/assistants');
        if (response.ok) {
            const data = await response.json();
            assistants = data.data || [];
            // Initialize counts as loading
            assistants.forEach(a => { a._threadCount = null; a._memoryCount = null; });
            renderAssistants();
            // Fetch thread/memory counts in parallel
            await loadAssistantCounts();
        } else {
            container.innerHTML = '<p class="text-red-500 py-4">Failed to load assistants</p>';
        }
    } catch (error) {
        console.error('Error loading assistants:', error);
        container.innerHTML = '<p class="text-red-500 py-4">Error loading assistants</p>';
    } finally {
        spinner.classList.add('hidden');
    }
}

async function loadAssistantCounts() {
    try {
        const ids = assistants.map(a => a.id);
        const response = await fetch('/api/assistants/counts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({assistant_ids: ids})
        });
        if (response.ok) {
            const result = await response.json();
            const counts = result.data || {};
            assistants.forEach(a => {
                const c = counts[a.id];
                a._threadCount = c ? c.threads : 0;
                a._memoryCount = c ? c.memories : 0;
            });
        } else {
            assistants.forEach(a => { a._threadCount = 0; a._memoryCount = 0; });
        }
    } catch (err) {
        console.error('Error loading counts:', err);
        assistants.forEach(a => { a._threadCount = 0; a._memoryCount = 0; });
    }
    renderAssistants();
}

function getFilteredAssistants() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filtered = assistants.filter(a => 
        a.name?.toLowerCase().includes(searchTerm) ||
        a.model?.toLowerCase().includes(searchTerm)
    );
    return sortData(filtered);
}

function renderAssistants() {
    const container = document.getElementById('assistantsContainer');
    const countEl = document.getElementById('assistantCount');
    const filtered = getFilteredAssistants();
    
    countEl.textContent = `Showing ${filtered.length} of ${assistants.length} assistants`;

    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 py-4">No assistants found</p>';
        return;
    }

    switch (currentViewMode) {
        case 'icons':
            renderIconsView(container, filtered);
            break;
        case 'list':
            renderListView(container, filtered);
            break;
        case 'columns':
            renderColumnsView(container, filtered);
            break;
        case 'gallery':
            renderGalleryView(container, filtered);
            break;
        default:
            renderListView(container, filtered);
    }
}

function renderIconsView(container, data) {
    container.innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            ${data.map(assistant => `
                <div onclick="viewAssistant('${assistant.id}')" class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-gray-700 hover:shadow-md transition-all cursor-pointer text-center group">
                    <div class="w-12 h-12 mx-auto mb-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">
                        ${(assistant.name || '?').charAt(0).toUpperCase()}
                    </div>
                    <h3 class="font-medium text-gray-900 dark:text-white text-sm truncate" title="${escapeHtml(assistant.name || 'Unnamed')}">${escapeHtml(assistant.name || 'Unnamed')}</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 truncate">${escapeHtml(assistant.model || 'Unknown')}</p>
                    <div class="mt-2 opacity-0 group-hover:opacity-100 transition-opacity flex justify-center gap-1">
                        <button onclick="event.stopPropagation(); editAssistant('${assistant.id}')" class="px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
                        <button onclick="event.stopPropagation(); deleteAssistant('${assistant.id}')" class="px-2 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function renderListView(container, data) {
    container.innerHTML = `
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                <thead class="bg-gray-50 dark:bg-gray-900">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('name')">
                            <div class="flex items-center">Name <span class="ml-1">${getSortIndicator('name')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('id')">
                            <div class="flex items-center">ID <span class="ml-1">${getSortIndicator('id')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('model')">
                            <div class="flex items-center">Model <span class="ml-1">${getSortIndicator('model')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('_threadCount')">
                            <div class="flex items-center justify-center">Threads <span class="ml-1">${getSortIndicator('_threadCount')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('_memoryCount')">
                            <div class="flex items-center justify-center">Memories <span class="ml-1">${getSortIndicator('_memoryCount')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                    ${data.map(assistant => `
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer" onclick="viewAssistant('${assistant.id}')">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white">${escapeHtml(assistant.name || 'Unnamed')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400 font-mono text-xs">${escapeHtml(assistant.id || '')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${escapeHtml(assistant.model || '—')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                                ${assistant._threadCount === null 
                                    ? '<span class="inline-block w-4 h-4 animate-spin rounded-full border-2 border-gray-300 border-t-blue-500"></span>' 
                                    : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${assistant._threadCount > 0 ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200' : 'bg-bb-steel/70 text-bb-phantom dark:bg-bb-steelDark dark:text-bb-phantomLight'}">${assistant._threadCount}</span>`
                                }
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-center text-sm">
                                ${assistant._memoryCount === null 
                                    ? '<span class="inline-block w-4 h-4 animate-spin rounded-full border-2 border-gray-300 border-t-purple-500"></span>' 
                                    : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${assistant._memoryCount > 0 ? 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-200' : 'bg-bb-steel/70 text-bb-phantom dark:bg-bb-steelDark dark:text-bb-phantomLight'}">${assistant._memoryCount}</span>`
                                }
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2" onclick="event.stopPropagation()">
                                <button onclick="viewAssistant('${assistant.id}')" class="text-green-600 hover:text-green-900 dark:text-green-400 dark:hover:text-green-300">View</button>
                                <button onclick="editAssistant('${assistant.id}')" class="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300">Edit</button>
                                <button onclick="deleteAssistant('${assistant.id}')" class="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300">Delete</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

function renderColumnsView(container, data) {
    const modelGroups = {};
    data.forEach(assistant => {
        const model = assistant.model || 'Unknown';
        if (!modelGroups[model]) modelGroups[model] = [];
        modelGroups[model].push(assistant);
    });
    
    const sortedModels = Object.keys(modelGroups).sort();
    
    container.innerHTML = `
        <div class="flex border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden" style="height: 500px;">
            <!-- Models Column -->
            <div class="w-56 flex-shrink-0 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 overflow-y-auto">
                <div class="p-2 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700">Models</div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    <div onclick="selectColumnModel('')" class="px-3 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${selectedModel === '' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}">
                        <div class="flex justify-between items-center">
                            <span>All Models</span>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${data.length}</span>
                        </div>
                    </div>
                    ${sortedModels.map(model => `
                        <div onclick="selectColumnModel('${escapeHtml(model)}')" class="px-3 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${selectedModel === model ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}">
                            <div class="flex justify-between items-center">
                                <span class="truncate text-sm">${escapeHtml(model)}</span>
                                <span class="text-xs text-gray-500 dark:text-gray-400">${modelGroups[model].length}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
            <!-- Assistants Column -->
            <div class="flex-1 overflow-y-auto">
                <div class="p-2 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900">Assistants</div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    ${(selectedModel ? modelGroups[selectedModel] || [] : data).map(assistant => `
                        <div onclick="viewAssistant('${assistant.id}')" class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer group">
                            <div class="flex items-center justify-between">
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(assistant.name || 'Unnamed')}</h4>
                                    <p class="text-xs text-gray-500 dark:text-gray-400 font-mono truncate">${escapeHtml(assistant.id || '')}</p>
                                </div>
                                <div class="flex gap-1 ml-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="event.stopPropagation(); editAssistant('${assistant.id}')" class="px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
                                    <button onclick="event.stopPropagation(); deleteAssistant('${assistant.id}')" class="px-2 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

function selectColumnModel(model) {
    selectedModel = model;
    renderAssistants();
}

function renderGalleryView(container, data) {
    container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            ${data.map(assistant => `
                <div onclick="viewAssistant('${assistant.id}')" class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden hover:shadow-lg transition-shadow cursor-pointer">
                    <div class="h-20 bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                        <span class="text-4xl font-bold text-white">${(assistant.name || '?').charAt(0).toUpperCase()}</span>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">${escapeHtml(assistant.name || 'Unnamed')}</h3>
                        <p class="text-xs text-gray-500 dark:text-gray-400 font-mono mt-1 truncate">${escapeHtml(assistant.id || '')}</p>
                        <div class="mt-3 space-y-2">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 dark:text-gray-400">Model</span>
                                <span class="text-gray-900 dark:text-white truncate ml-2">${escapeHtml(assistant.model || 'Unknown')}</span>
                            </div>
                        </div>
                        ${assistant.system_prompt ? `
                            <div class="mt-3 p-2 bg-gray-50 dark:bg-gray-700 rounded text-sm text-gray-600 dark:text-gray-300 line-clamp-3">
                                ${escapeHtml(assistant.system_prompt)}
                            </div>
                        ` : ''}
                        <div class="mt-4 flex justify-between">
                            <button onclick="event.stopPropagation(); viewAssistant('${assistant.id}')" class="px-3 py-1 text-sm bg-green-600 text-white rounded hover:bg-green-700">View</button>
                            <div class="flex gap-1">
                                <button onclick="event.stopPropagation(); editAssistant('${assistant.id}')" class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
                                <button onclick="event.stopPropagation(); deleteAssistant('${assistant.id}')" class="px-3 py-1 text-sm bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function showCreateModal() {
    document.getElementById('modalTitle').textContent = 'Create Assistant';
    document.getElementById('assistantId').value = '';
    document.getElementById('assistantForm').reset();
    document.getElementById('assistantModal').classList.remove('hidden');
}

function editAssistant(id) {
    const assistant = assistants.find(a => a.id === id);
    if (!assistant) return;
    
    document.getElementById('modalTitle').textContent = 'Edit Assistant';
    document.getElementById('assistantId').value = assistant.id;
    document.getElementById('assistantName').value = assistant.name || '';
    document.getElementById('assistantModel').value = assistant.model || '';
    document.getElementById('assistantPrompt').value = assistant.system_prompt || '';
    document.getElementById('assistantModal').classList.remove('hidden');
}

function hideModal() {
    document.getElementById('assistantModal').classList.add('hidden');
}

async function deleteAssistant(id) {
    if (!confirm('Are you sure you want to delete this assistant?')) return;
    
    try {
        const response = await fetch(`/api/assistants/${id}`, {method: 'DELETE'});
        if (response.ok) {
            loadAssistants();
        } else {
            alert('Failed to delete assistant');
        }
    } catch (error) {
        console.error('Error deleting assistant:', error);
        alert('Error deleting assistant');
    }
}

document.getElementById('assistantForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('assistantId').value;
    const data = {
        name: document.getElementById('assistantName').value,
        model: document.getElementById('assistantModel').value,
        system_prompt: document.getElementById('assistantPrompt').value
    };

    try {
        const url = id ? `/api/assistants/${id}` : '/api/assistants';
        const method = id ? 'PUT' : 'POST';
        const response = await fetch(url, {
            method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (response.ok) {
            hideModal();
            loadAssistants();
        } else {
            const error = await response.json();
            alert(error.error || 'Failed to save assistant');
        }
    } catch (error) {
        console.error('Error saving assistant:', error);
        alert('Error saving assistant');
    }
});

// Detail Panel State
// ──────────────────────────────────────
let detailMemories = [];
let detailThreads = [];
let activeDetailTab = 'memories';
let detailSearchTerm = '';
let expandedThreads = new Set();
let currentDetailPanel = null;
let currentDetailAssistantId = null;

function closeDetailPanel() {
    if (currentDetailPanel) {
        currentDetailPanel.remove();
        currentDetailPanel = null;
        document.body.style.overflow = '';
    }
}

async function viewAssistant(id) {
    const assistant = assistants.find(a => a.id === id);
    if (!assistant) return;

    currentDetailAssistantId = id;
    document.body.style.overflow = 'hidden';

    const panel = document.createElement('div');
    panel.className = 'fixed inset-0 z-50 detail-panel-enter';
    panel.innerHTML = buildDetailShell(assistant);
    currentDetailPanel = panel;
    document.body.appendChild(panel);

    // Wire up escape + backdrop
    function onKey(e) {
        if (e.key === 'Escape') { closeDetailPanel(); document.removeEventListener('keydown', onKey); }
    }
    document.addEventListener('keydown', onKey);
    panel.querySelector('[data-backdrop]').addEventListener('click', () => { closeDetailPanel(); document.removeEventListener('keydown', onKey); });

    // Show loading skeleton in tab content
    renderDetailTabContent('loading');

    // Fetch data in parallel
    const [threadsRes, memoriesRes] = await Promise.all([
        fetch(`/api/assistants/${id}/threads`).catch(() => ({ok: false})),
        fetch(`/api/assistants/${id}/memories`).catch(() => ({ok: false}))
    ]);

    detailThreads = [];
    detailMemories = [];
    if (threadsRes.ok) { const d = await threadsRes.json(); detailThreads = d.data || []; }
    if (memoriesRes.ok) { const d = await memoriesRes.json(); detailMemories = d.data || []; }

    // Update tab badges
    const memBadge = panel.querySelector('[data-badge="memories"]');
    const thrBadge = panel.querySelector('[data-badge="threads"]');
    if (memBadge) { memBadge.textContent = detailMemories.length; memBadge.classList.add('badge-pulse'); }
    if (thrBadge) { thrBadge.textContent = detailThreads.length; thrBadge.classList.add('badge-pulse'); }

    activeDetailTab = 'memories';
    detailSearchTerm = '';
    expandedThreads = new Set();
    renderDetailTabContent();
}

function toggleSystemPrompt() {
    const body = document.getElementById('system-prompt-body');
    const chevron = document.getElementById('prompt-chevron');
    if (!body) return;
    body.classList.toggle('hidden');
    if (body.classList.contains('hidden')) {
        chevron.style.transform = '';
    } else {
        chevron.style.transform = 'rotate(90deg)';
    }
}

function switchDetailTab(tab) {
    activeDetailTab = tab;
    detailSearchTerm = '';
    const searchInput = document.getElementById('detailSearch');
    if (searchInput) { searchInput.value = ''; searchInput.placeholder = tab === 'memories' ? 'Search memories...' : 'Search threads...'; }

    document.querySelectorAll('[data-tab]').forEach(btn => {
        if (btn.getAttribute('data-tab') === tab) {
            btn.classList.add('active', 'text-bb-blue');
            btn.classList.remove('text-gray-500', 'dark:text-gray-400');
        } else {
            btn.classList.remove('active', 'text-bb-blue');
            btn.classList.add('text-gray-500', 'dark:text-gray-400');
        }
    });
    renderDetailTabContent();
}

function onDetailSearch(val) {
    detailSearchTerm = val.toLowerCase();
    renderDetailTabContent();
}

function renderDetailTabContent(state) {
    const inner = document.getElementById('detailInner');
    if (!inner) return;

    if (state === 'loading') {
        inner.innerHTML = `
            <div class="space-y-3">
                ${[0,1,2,3,4].map(i => `
                    <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 animate-pulse">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4 mb-3"></div>
                        <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2 mb-2"></div>
                        <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/3"></div>
                    </div>
                `).join('')}
            </div>
        `;
        return;
    }

    if (activeDetailTab === 'memories') {
        renderMemoriesTab(inner);
    } else {
        renderThreadsTab(inner);
    }
}

// ──────────────────────────────────────
// Memories Tab
// ──────────────────────────────────────
function renderMemoriesTab(container) {
    let filtered = detailMemories;
    if (detailSearchTerm) {
        filtered = detailMemories.filter(m => {
            const content = (m.content || '').toLowerCase();
            const meta = JSON.stringify(m.metadata || {}).toLowerCase();
            const id = (m.id || '').toLowerCase();
            return content.includes(detailSearchTerm) || meta.includes(detailSearchTerm) || id.includes(detailSearchTerm);
        });
    }

    if (filtered.length === 0 && detailMemories.length === 0) {
        container.innerHTML = buildEmptyState('memories');
        return;
    }

    if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-12"><p class="text-gray-500 dark:text-gray-400">No memories match "<strong>${escapeHtml(detailSearchTerm)}</strong>"</p></div>`;
        return;
    }

    const countHtml = `<p class="text-xs text-gray-500 dark:text-gray-400 mb-3">${filtered.length} ${filtered.length === 1 ? 'memory' : 'memories'}${detailSearchTerm ? ' matching' : ''}</p>`;

    container.innerHTML = countHtml + `<div class="space-y-3">${filtered.map((m, i) => buildMemoryCard(m, i)).join('')}</div>`;
}

function buildMemoryCard(memory, index) {
    const content = memory.content || '';
    let displayContent = '';
    let parsedJson = null;

    try {
        parsedJson = JSON.parse(content);
        if (typeof parsedJson === 'object' && parsedJson !== null) {
            displayContent = formatJsonDisplay(parsedJson);
        } else {
            displayContent = `<p class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap leading-relaxed">${escapeHtml(String(content))}</p>`;
        }
    } catch {
        displayContent = `<p class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap leading-relaxed">${escapeHtml(content)}</p>`;
    }

    const metaEntries = [];
    if (memory.id) metaEntries.push({label: 'ID', value: memory.id, mono: true});
    if (memory.metadata) {
        for (const [k, v] of Object.entries(memory.metadata)) {
            if (v === null || v === undefined || k === 'id') continue;
            let displayVal = typeof v === 'object' ? JSON.stringify(v) : String(v);
            const isDate = k.toLowerCase().includes('expir') || k.toLowerCase().includes('created') || k.toLowerCase().includes('updated');
            if (isDate) {
                try { displayVal = new Date(displayVal).toLocaleString(); } catch {}
            }
            metaEntries.push({label: formatMetaLabel(k), value: displayVal, mono: k === 'user' || k === '_id' || k === 'assistant' || k === 'assistant_id'});
        }
    }
    if (memory.tags && memory.tags.length > 0) {
        metaEntries.push({label: 'Tags', value: memory.tags.join(', ')});
    }
    if (memory.created_at) {
        try { metaEntries.push({label: 'Created', value: new Date(memory.created_at).toLocaleString()}); } catch {}
    }
    if (memory.updated_at) {
        try { metaEntries.push({label: 'Updated', value: new Date(memory.updated_at).toLocaleString()}); } catch {}
    }

    const metaHtml = metaEntries.length > 0 ? `
        <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700/50">
            <div class="flex flex-wrap gap-x-4 gap-y-1.5">
                ${metaEntries.map(e => `
                    <div class="flex items-baseline gap-1.5">
                        <span class="text-[10px] font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">${escapeHtml(e.label)}</span>
                        <span class="text-xs ${e.mono ? 'font-mono' : ''} text-gray-600 dark:text-gray-400 truncate max-w-[200px]" title="${escapeHtml(e.value)}">${escapeHtml(e.value)}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    ` : '';

    return `
        <div class="stagger-item card-hover bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 group" style="--i: ${Math.min(index, 20)}">
            <div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0">
                    ${displayContent}
                </div>
                <div class="flex flex-col gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-all">
                    <button onclick="copyMemoryContent(${index})" class="p-1.5 rounded-md text-gray-300 dark:text-gray-600 hover:text-bb-blue hover:bg-bb-blue/10 transition-all" title="Copy content">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-width="2"/></svg>
                    </button>
                    ${memory.id ? `<button onclick="event.stopPropagation(); deleteMemory('${escapeHtml(memory.id)}')" class="p-1.5 rounded-md text-gray-300 dark:text-gray-600 hover:text-red-500 hover:bg-red-500/10 transition-all" title="Delete memory">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>` : ''}
                </div>
            </div>
            ${metaHtml}
        </div>
    `;
}

function formatJsonDisplay(obj) {
    if (Array.isArray(obj)) {
        return `<pre class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap font-mono bg-gray-50 dark:bg-gray-900/40 rounded p-2 overflow-x-auto">${escapeHtml(JSON.stringify(obj, null, 2))}</pre>`;
    }
    const keys = Object.keys(obj);
    if (keys.length === 0) return '<p class="text-sm text-gray-400 italic">Empty object</p>';

    return `<div class="space-y-1.5">${keys.map(k => {
        const v = obj[k];
        const valStr = typeof v === 'object' && v !== null ? JSON.stringify(v) : String(v ?? '');
        return `
            <div class="flex items-baseline gap-2">
                <span class="text-xs font-medium text-purple-600 dark:text-purple-400 flex-shrink-0">${escapeHtml(k)}</span>
                <span class="text-sm text-gray-800 dark:text-gray-200 break-all">${escapeHtml(valStr)}</span>
            </div>
        `;
    }).join('')}</div>`;
}

function formatMetaLabel(key) {
    return key.replace(/_/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').replace(/^./, s => s.toUpperCase());
}

// ──────────────────────────────────────
// Threads Tab
// ──────────────────────────────────────
function renderThreadsTab(container) {
    let filtered = detailThreads;
    if (detailSearchTerm) {
        filtered = detailThreads.filter(t => {
            const title = (t.title || '').toLowerCase();
            const msgs = (t.messages || []).some(m => (m.content || '').toLowerCase().includes(detailSearchTerm));
            return title.includes(detailSearchTerm) || msgs;
        });
    }

    if (filtered.length === 0 && detailThreads.length === 0) {
        container.innerHTML = buildEmptyState('threads');
        return;
    }

    if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-12"><p class="text-gray-500 dark:text-gray-400">No threads match "<strong>${escapeHtml(detailSearchTerm)}</strong>"</p></div>`;
        return;
    }

    const countHtml = `<p class="text-xs text-gray-500 dark:text-gray-400 mb-3">${filtered.length} ${filtered.length === 1 ? 'thread' : 'threads'}${detailSearchTerm ? ' matching' : ''}</p>`;

    container.innerHTML = countHtml + `<div class="space-y-2">${filtered.map((t, i) => buildThreadCard(t, i)).join('')}</div>`;
}

function buildThreadCard(thread, index) {
    const msgCount = thread.messages?.length || 0;
    const isExpanded = expandedThreads.has(thread.id);
    const created = thread.created_at ? new Date(thread.created_at).toLocaleDateString() : '';
    const roleColors = {
        user: 'border-bb-blue bg-blue-50 dark:bg-blue-900/20',
        assistant: 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20',
        system: 'border-amber-500 bg-amber-50 dark:bg-amber-900/20',
        tool: 'border-gray-400 bg-gray-50 dark:bg-gray-800',
    };

    const messagesHtml = isExpanded && thread.messages ? `
        <div class="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700/50 space-y-2 expand-enter">
            ${thread.messages.map(msg => `
                <div class="border-l-3 ${roleColors[msg.role] || roleColors.tool} pl-3 py-2 rounded-r-md" style="border-left-width: 3px;">
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[10px] font-bold uppercase tracking-wider ${msg.role === 'user' ? 'text-bb-blue' : msg.role === 'assistant' ? 'text-emerald-600 dark:text-emerald-400' : 'text-gray-500'}">${escapeHtml(msg.role || 'unknown')}</span>
                        ${msg.timestamp ? `<span class="text-[10px] text-gray-400">${new Date(msg.timestamp).toLocaleString()}</span>` : ''}
                    </div>
                    <p class="text-sm text-gray-800 dark:text-gray-200 whitespace-pre-wrap leading-relaxed">${escapeHtml(msg.content || '')}</p>
                </div>
            `).join('')}
        </div>
    ` : '';

    return `
        <div class="stagger-item card-hover bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden" style="--i: ${Math.min(index, 20)}">
            <div class="p-4 cursor-pointer" onclick="toggleThread('${thread.id}')">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3 min-w-0">
                        <svg class="w-4 h-4 flex-shrink-0 text-gray-400 transition-transform ${isExpanded ? 'rotate-90' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                        <div class="min-w-0">
                            <h4 class="text-sm font-medium text-gray-900 dark:text-white truncate">${escapeHtml(thread.title || 'Untitled')}</h4>
                            <p class="text-xs text-gray-500 dark:text-gray-400 font-mono truncate mt-0.5">${escapeHtml(thread.id || '')}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0 ml-3">
                        ${created ? `<span class="text-xs text-gray-400">${created}</span>` : ''}
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${msgCount > 0 ? 'bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300' : 'bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-400'}">
                            ${msgCount} msg${msgCount !== 1 ? 's' : ''}
                        </span>
                        ${thread.id ? `<button onclick="event.stopPropagation(); deleteThread('${escapeHtml(thread.id)}')" class="p-1.5 rounded-md text-gray-300 dark:text-gray-600 hover:text-red-500 hover:bg-red-500/10 opacity-0 group-hover:opacity-100 transition-all" title="Delete thread">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>` : ''}
                    </div>
                </div>
            </div>
            ${messagesHtml}
        </div>
    `;
}

function toggleThread(threadId) {
    if (expandedThreads.has(threadId)) {
        expandedThreads.delete(threadId);
    } else {
        expandedThreads.add(threadId);

        const thread = detailThreads.find(t => t.id === threadId);
        if (thread && (!thread.messages || thread.messages.length === 0)) {
            fetch(`/api/threads/${threadId}`)
                .then(r => r.json())
                .then(data => {
                    thread.messages = data.messages || [];
                    renderDetailTabContent();
                })
                .catch(() => {});
            return;
        }
    }
    renderDetailTabContent();
}

// ──────────────────────────────────────
// Empty States
// ──────────────────────────────────────
function buildEmptyState(type) {
    const configs = {
        memories: {
            icon: `<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1"><path d="M9.663 17h4.673M12 3v1m6.364 1.636-.707.707M21 12h-1M4 12H3m3.343-5.657-.707-.707m2.828 9.9a5 5 0 1 1 7.072 0l-.548.547A3.374 3.374 0 0 0 14 18.469V19a2 2 0 1 1-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547Z"/></svg>`,
            title: 'No memories yet',
            desc: 'This assistant hasn\'t stored any memories. Memories are created during conversations to help the assistant remember important context.'
        },
        threads: {
            icon: `<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>`,
            title: 'No threads yet',
            desc: 'No conversation threads have been created with this assistant. Start a conversation to see threads appear here.'
        }
    };
    const c = configs[type];
    return `
        <div class="flex flex-col items-center justify-center py-20 text-center">
            <div class="empty-float text-gray-300 dark:text-gray-600 mb-6">${c.icon}</div>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">${c.title}</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 max-w-sm leading-relaxed">${c.desc}</p>
        </div>
    `;
}

// ──────────────────────────────────────
// Utilities
// ──────────────────────────────────────
async function deleteMemory(memoryId) {
    if (!confirm('Delete this memory? This cannot be undone.')) return;
    try {
        const res = await fetch(`/api/memory/${memoryId}?assistant_id=${currentDetailAssistantId}`, {method: 'DELETE'});
        if (res.ok) {
            detailMemories = detailMemories.filter(m => m.id !== memoryId);
            const badge = document.querySelector('[data-badge="memories"]');
            if (badge) { badge.textContent = detailMemories.length; badge.classList.add('badge-pulse'); }
            renderDetailTabContent();
            showCopyToast('Memory deleted');
        } else {
            const err = await res.json().catch(() => ({}));
            alert(err.error || 'Failed to delete memory');
        }
    } catch { alert('Failed to delete memory'); }
}

async function deleteThread(threadId) {
    if (!confirm('Delete this thread? This cannot be undone.')) return;
    try {
        const res = await fetch(`/api/threads/${threadId}`, {method: 'DELETE'});
        if (res.ok) {
            detailThreads = detailThreads.filter(t => t.id !== threadId);
            expandedThreads.delete(threadId);
            const badge = document.querySelector('[data-badge="threads"]');
            if (badge) { badge.textContent = detailThreads.length; badge.classList.add('badge-pulse'); }
            renderDetailTabContent();
            showCopyToast('Thread deleted');
        } else {
            const err = await res.json().catch(() => ({}));
            alert(err.error || 'Failed to delete thread');
        }
    } catch { alert('Failed to delete thread'); }
}

function copyMemoryContent(index) {
    const filtered = detailSearchTerm
        ? detailMemories.filter(m => {
            const c = (m.content || '').toLowerCase();
            const meta = JSON.stringify(m.metadata || {}).toLowerCase();
            const id = (m.id || '').toLowerCase();
            return c.includes(detailSearchTerm) || meta.includes(detailSearchTerm) || id.includes(detailSearchTerm);
        })
        : detailMemories;
    const memory = filtered[index];
    if (memory) copyToClipboard(memory.content || '');
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        showCopyToast();
    }).catch(() => {});
}

function showCopyToast(msg) {
    let toast = document.getElementById('copy-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'copy-toast';
        toast.className = 'fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-4 py-2 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 text-sm font-medium rounded-lg shadow-lg transition-all duration-300';
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, 8px)';
        document.body.appendChild(toast);
    }
    toast.textContent = msg || 'Copied to clipboard';
    toast.style.opacity = '1';
    toast.style.transform = 'translate(-50%, 0)';
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, 8px)';
    }, 1800);
}

document.getElementById('searchInput').addEventListener('input', renderAssistants);

// Global Escape key handler for create/edit modal
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        const createModal = document.getElementById('assistantModal');
        if (createModal && !createModal.classList.contains('hidden')) {
            hideModal();
        }
    }
});

// Initialize
currentViewMode = getViewMode();
updateViewModeButtons();
loadAssistants();
</script>
{% endblock %}
