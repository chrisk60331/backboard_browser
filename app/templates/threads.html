{% extends "base.html" %}

{% block title %}Threads - Backboard Browser{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Threads</h1>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Manage conversation threads</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                Create Thread
            </button>
            <!-- View Mode Selector -->
            <div class="flex items-center space-x-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-1">
                <button onclick="setViewMode('icons')" id="viewmode-icons" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Icons">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </button>
                <button onclick="setViewMode('list')" id="viewmode-list" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="List">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                </button>
                <button onclick="setViewMode('columns')" id="viewmode-columns" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Columns">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
                </button>
                <button onclick="setViewMode('gallery')" id="viewmode-gallery" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Gallery">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <div class="px-4 py-5 sm:p-6">
            <div class="mb-4 space-y-3">
                <input type="text" id="searchInput" placeholder="Search threads..." class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                <div class="flex items-center space-x-2">
                    <div id="loadingSpinner" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-blue-600 dark:border-blue-400"></div>
                    <span id="threadCount" class="text-sm text-gray-600 dark:text-gray-400"></span>
                </div>
            </div>
            <div id="threadsContainer">
                <!-- Threads will be loaded here based on view mode -->
            </div>
        </div>
    </div>
</div>

<!-- Create Modal -->
<div id="threadModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white dark:bg-gray-800">
        <div class="mt-3">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Create Thread</h3>
            <form id="threadForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Title</label>
                    <input type="text" id="threadTitle" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Initial Message (optional)</label>
                    <textarea id="threadMessage" rows="4" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="hideModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- View Thread Modal -->
<div id="viewThreadModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-4xl shadow-lg rounded-md bg-white dark:bg-gray-800 max-h-[80vh] overflow-y-auto">
        <div class="mt-3">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-medium text-gray-900 dark:text-white" id="viewThreadTitle">Thread</h3>
                <button onclick="hideViewModal()" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">✕</button>
            </div>
            <div id="threadMessages" class="space-y-4">
                <!-- Messages will be loaded here -->
            </div>
        </div>
    </div>
</div>

<script>
let threads = [];
let assistants = [];
let currentViewMode = 'list';
let sortColumn = 'title';
let sortDirection = 'asc';
let selectedAssistantId = '';
const PAGE_KEY = 'viewmode_threads';

// View Mode Functions
function getViewMode() {
    return localStorage.getItem(PAGE_KEY) || 'list';
}

function setViewMode(mode) {
    currentViewMode = mode;
    localStorage.setItem(PAGE_KEY, mode);
    updateViewModeButtons();
    renderThreads();
}

function updateViewModeButtons() {
    const modes = ['icons', 'list', 'columns', 'gallery'];
    modes.forEach(mode => {
        const btn = document.getElementById(`viewmode-${mode}`);
        if (btn) {
            if (mode === currentViewMode) {
                btn.classList.add('bg-white', 'dark:bg-gray-600', 'shadow-sm');
                btn.classList.remove('hover:bg-gray-200', 'dark:hover:bg-gray-600');
            } else {
                btn.classList.remove('bg-white', 'dark:bg-gray-600', 'shadow-sm');
                btn.classList.add('hover:bg-gray-200', 'dark:hover:bg-gray-600');
            }
        }
    });
}

// Sort Functions
function sortBy(column) {
    if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
        sortColumn = column;
        sortDirection = 'asc';
    }
    renderThreads();
}

function getSortIndicator(column) {
    if (sortColumn !== column) return '';
    return sortDirection === 'asc' ? '↑' : '↓';
}

function sortData(data) {
    return [...data].sort((a, b) => {
        let aVal, bVal;
        
        if (sortColumn === 'assistant') {
            const aAssist = assistants.find(x => x.id === a.assistant_id);
            const bAssist = assistants.find(x => x.id === b.assistant_id);
            aVal = aAssist?.name || '';
            bVal = bAssist?.name || '';
        } else if (sortColumn === 'messages') {
            aVal = a.messages?.length || 0;
            bVal = b.messages?.length || 0;
        } else {
            aVal = a[sortColumn];
            bVal = b[sortColumn];
        }
        
        if (aVal == null) aVal = '';
        if (bVal == null) bVal = '';
        
        if (typeof aVal === 'number' && typeof bVal === 'number') {
            return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
        }
        
        if (sortColumn === 'created_at') {
            aVal = new Date(aVal || 0).getTime();
            bVal = new Date(bVal || 0).getTime();
            return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
        }
        
        const comparison = String(aVal).localeCompare(String(bVal));
        return sortDirection === 'asc' ? comparison : -comparison;
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadAssistants() {
    try {
        const response = await fetch('/api/assistants?limit=10000');
        if (response.ok) {
            const data = await response.json();
            assistants = (data.data || []).filter(a => a.name !== 'bb_browser_cache');
        }
    } catch (error) {
        console.error('Error loading assistants:', error);
    }
}

async function loadThreads() {
    const spinner = document.getElementById('loadingSpinner');
    const countEl = document.getElementById('threadCount');
    const container = document.getElementById('threadsContainer');
    
    spinner.classList.remove('hidden');
    countEl.textContent = 'Loading threads...';
    container.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 dark:border-blue-400"></div><span class="ml-3 text-gray-600 dark:text-gray-400">Loading threads...</span></div>';
    
    try {
        const response = await fetch('/api/threads');
        if (response.ok) {
            const data = await response.json();
            threads = data.data || [];
            renderThreads();
        } else {
            container.innerHTML = '<p class="text-red-500 py-4">Failed to load threads</p>';
        }
    } catch (error) {
        console.error('Error loading threads:', error);
        container.innerHTML = '<p class="text-red-500 py-4">Error loading threads</p>';
    } finally {
        spinner.classList.add('hidden');
    }
}

function getFilteredThreads() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    let filtered = threads;
    
    if (searchTerm) {
        filtered = filtered.filter(t => 
            t.title?.toLowerCase().includes(searchTerm) ||
            (t.messages && t.messages.some(m => m.content?.toLowerCase().includes(searchTerm)))
        );
    }
    
    return sortData(filtered);
}

function getAssistantName(assistantId) {
    const assistant = assistants.find(a => a.id === assistantId);
    return assistant?.name || 'Unknown';
}

function renderThreads() {
    const container = document.getElementById('threadsContainer');
    const countEl = document.getElementById('threadCount');
    const filtered = getFilteredThreads();
    
    countEl.textContent = `Showing ${filtered.length} of ${threads.length} threads`;

    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 py-4">No threads found</p>';
        return;
    }

    switch (currentViewMode) {
        case 'icons':
            renderIconsView(container, filtered);
            break;
        case 'list':
            renderListView(container, filtered);
            break;
        case 'columns':
            renderColumnsView(container, filtered);
            break;
        case 'gallery':
            renderGalleryView(container, filtered);
            break;
        default:
            renderListView(container, filtered);
    }
}

function renderIconsView(container, data) {
    container.innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            ${data.map(thread => `
                <div onclick="viewThread('${thread.id}')" class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-gray-700 hover:shadow-md transition-all cursor-pointer text-center group">
                    <div class="w-12 h-12 mx-auto mb-3 bg-gradient-to-br from-green-500 to-teal-600 rounded-lg flex items-center justify-center text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <h3 class="font-medium text-gray-900 dark:text-white text-sm truncate" title="${escapeHtml(thread.title || 'Untitled')}">${escapeHtml(thread.title || 'Untitled')}</h3>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${thread.messages?.length || 0} messages</p>
                    <p class="text-xs text-blue-600 dark:text-blue-400 truncate">${escapeHtml(getAssistantName(thread.assistant_id))}</p>
                    <div class="mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="event.stopPropagation(); deleteThread('${thread.id}')" class="px-2 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function renderListView(container, data) {
    container.innerHTML = `
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                <thead class="bg-gray-50 dark:bg-gray-900">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('title')">
                            <div class="flex items-center">Title <span class="ml-1">${getSortIndicator('title')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('assistant')">
                            <div class="flex items-center">Assistant <span class="ml-1">${getSortIndicator('assistant')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('messages')">
                            <div class="flex items-center">Messages <span class="ml-1">${getSortIndicator('messages')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('created_at')">
                            <div class="flex items-center">Created <span class="ml-1">${getSortIndicator('created_at')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                    ${data.map(thread => `
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer" onclick="viewThread('${thread.id}')">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-white">${escapeHtml(thread.title || 'Untitled')}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-blue-600 dark:text-blue-400">${escapeHtml(getAssistantName(thread.assistant_id))}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${thread.messages?.length || 0}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">${thread.created_at ? new Date(thread.created_at).toLocaleString() : '—'}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2" onclick="event.stopPropagation()">
                                <button onclick="viewThread('${thread.id}')" class="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300">View</button>
                                <button onclick="deleteThread('${thread.id}')" class="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300">Delete</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        </div>
    `;
}

function renderColumnsView(container, data) {
    const assistantGroups = {};
    data.forEach(thread => {
        const assistantId = thread.assistant_id || 'unknown';
        const assistantName = getAssistantName(assistantId);
        if (!assistantGroups[assistantId]) {
            assistantGroups[assistantId] = { name: assistantName, threads: [] };
        }
        assistantGroups[assistantId].threads.push(thread);
    });
    
    const sortedAssistantIds = Object.keys(assistantGroups).sort((a, b) => 
        assistantGroups[a].name.localeCompare(assistantGroups[b].name)
    );
    
    container.innerHTML = `
        <div class="flex border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden" style="height: 500px;">
            <!-- Assistants Column -->
            <div class="w-48 flex-shrink-0 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 overflow-y-auto">
                <div class="p-2 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700">Assistants</div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    <div onclick="selectColumnAssistant('')" class="px-3 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${selectedAssistantId === '' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}">
                        <div class="flex justify-between items-center">
                            <span>All Assistants</span>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${data.length}</span>
                        </div>
                    </div>
                    ${sortedAssistantIds.map(id => `
                        <div onclick="selectColumnAssistant('${id}')" class="px-3 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${selectedAssistantId === id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}">
                            <div class="flex justify-between items-center">
                                <span class="truncate">${escapeHtml(assistantGroups[id].name)}</span>
                                <span class="text-xs text-gray-500 dark:text-gray-400">${assistantGroups[id].threads.length}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
            <!-- Threads Column -->
            <div class="flex-1 overflow-y-auto">
                <div class="p-2 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900">Threads</div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    ${(selectedAssistantId ? assistantGroups[selectedAssistantId]?.threads || [] : data).map(thread => `
                        <div onclick="viewThread('${thread.id}')" class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer group">
                            <div class="flex items-center justify-between">
                                <div class="flex-1 min-w-0">
                                    <h4 class="font-medium text-gray-900 dark:text-white truncate">${escapeHtml(thread.title || 'Untitled')}</h4>
                                    <p class="text-xs text-gray-500 dark:text-gray-400">${thread.messages?.length || 0} messages ${thread.created_at ? '• ' + new Date(thread.created_at).toLocaleDateString() : ''}</p>
                                </div>
                                <button onclick="event.stopPropagation(); deleteThread('${thread.id}')" class="ml-2 px-2 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700 opacity-0 group-hover:opacity-100 transition-opacity">Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

function selectColumnAssistant(id) {
    selectedAssistantId = id;
    renderThreads();
}

function renderGalleryView(container, data) {
    container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            ${data.map(thread => `
                <div onclick="viewThread('${thread.id}')" class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden hover:shadow-lg transition-shadow cursor-pointer">
                    <div class="h-20 bg-gradient-to-br from-green-500 to-teal-600 flex items-center justify-center">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">${escapeHtml(thread.title || 'Untitled')}</h3>
                        <p class="text-sm text-blue-600 dark:text-blue-400 mt-1">${escapeHtml(getAssistantName(thread.assistant_id))}</p>
                        <div class="mt-3 space-y-2">
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 dark:text-gray-400">Messages</span>
                                <span class="text-gray-900 dark:text-white">${thread.messages?.length || 0}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500 dark:text-gray-400">Created</span>
                                <span class="text-gray-900 dark:text-white">${thread.created_at ? new Date(thread.created_at).toLocaleDateString() : '—'}</span>
                            </div>
                        </div>
                        ${thread.messages && thread.messages.length > 0 ? `
                            <div class="mt-3 p-2 bg-gray-50 dark:bg-gray-700 rounded text-sm text-gray-600 dark:text-gray-300 line-clamp-3">
                                ${escapeHtml(thread.messages[0].content || '')}
                            </div>
                        ` : ''}
                        <div class="mt-4 flex justify-between">
                            <button onclick="event.stopPropagation(); viewThread('${thread.id}')" class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">View</button>
                            <button onclick="event.stopPropagation(); deleteThread('${thread.id}')" class="px-3 py-1 text-sm bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function showCreateModal() {
    document.getElementById('threadForm').reset();
    document.getElementById('threadModal').classList.remove('hidden');
}

function hideModal() {
    document.getElementById('threadModal').classList.add('hidden');
}

async function viewThread(id) {
    try {
        const response = await fetch(`/api/threads/${id}`);
        if (response.ok) {
            const thread = await response.json();
            document.getElementById('viewThreadTitle').textContent = thread.title || 'Untitled Thread';
            const messagesContainer = document.getElementById('threadMessages');
            
            if (thread.messages && thread.messages.length > 0) {
                messagesContainer.innerHTML = thread.messages.map(msg => `
                    <div class="border-l-4 ${msg.role === 'user' ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/20' : msg.role === 'assistant' ? 'border-green-500 bg-green-50 dark:bg-green-900/20' : 'border-gray-500 bg-gray-50 dark:bg-gray-900/20'} rounded-r-lg p-3">
                        <div class="flex items-start">
                            <span class="font-semibold text-gray-700 dark:text-gray-300 mr-2 uppercase text-xs">${msg.role}:</span>
                            <p class="text-gray-900 dark:text-white flex-1 whitespace-pre-wrap">${escapeHtml(msg.content || '')}</p>
                        </div>
                        ${msg.timestamp ? `<p class="text-xs text-gray-500 dark:text-gray-500 mt-1">${new Date(msg.timestamp).toLocaleString()}</p>` : ''}
                    </div>
                `).join('');
            } else {
                messagesContainer.innerHTML = '<p class="text-gray-500 dark:text-gray-400">No messages in this thread</p>';
            }
            
            document.getElementById('viewThreadModal').classList.remove('hidden');
        }
    } catch (error) {
        console.error('Error loading thread:', error);
    }
}

function hideViewModal() {
    document.getElementById('viewThreadModal').classList.add('hidden');
}

async function deleteThread(id) {
    if (!confirm('Are you sure you want to delete this thread?')) return;
    
    try {
        const response = await fetch(`/api/threads/${id}`, {method: 'DELETE'});
        if (response.ok) {
            loadThreads();
        } else {
            alert('Failed to delete thread');
        }
    } catch (error) {
        console.error('Error deleting thread:', error);
        alert('Error deleting thread');
    }
}

document.getElementById('threadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        title: document.getElementById('threadTitle').value || undefined,
        initial_message: document.getElementById('threadMessage').value || undefined
    };

    try {
        const response = await fetch('/api/threads', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (response.ok) {
            hideModal();
            loadThreads();
        } else {
            const error = await response.json();
            alert(error.error || 'Failed to create thread');
        }
    } catch (error) {
        console.error('Error creating thread:', error);
        alert('Error creating thread');
    }
});

document.getElementById('searchInput').addEventListener('input', renderThreads);

// Initialize
currentViewMode = getViewMode();
updateViewModeButtons();
loadAssistants().then(() => loadThreads());
</script>
{% endblock %}
