{% extends "base.html" %}

{% block title %}Memory - Backboard Browser{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Memory</h1>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Store and retrieve memories</p>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showCreateModal()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">
                Store Memory
            </button>
            <!-- View Mode Selector -->
            <div class="flex items-center space-x-1 bg-gray-100 dark:bg-gray-700 rounded-lg p-1">
                <button onclick="setViewMode('icons')" id="viewmode-icons" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Icons">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                </button>
                <button onclick="setViewMode('list')" id="viewmode-list" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="List">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                </button>
                <button onclick="setViewMode('columns')" id="viewmode-columns" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Columns">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"></path></svg>
                </button>
                <button onclick="setViewMode('gallery')" id="viewmode-gallery" class="p-2 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors" title="Gallery">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 shadow rounded-lg overflow-hidden">
        <div class="px-4 py-5 sm:p-6">
            <div class="mb-4 space-y-3">
                <input type="text" id="searchInput" placeholder="Search memories..." class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                <div class="flex items-center space-x-2">
                    <div id="loadingSpinner" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-blue-600 dark:border-blue-400"></div>
                    <span id="memoryCount" class="text-sm text-gray-600 dark:text-gray-400">Loading...</span>
                </div>
            </div>
            <div id="memoriesContainer">
                <!-- Memories will be loaded here based on view mode -->
            </div>
        </div>
    </div>
</div>

<!-- Create Modal -->
<div id="memoryModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white dark:bg-gray-800">
        <div class="mt-3">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Store Memory</h3>
            <form id="memoryForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Content</label>
                    <textarea id="memoryContent" rows="6" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tags (comma-separated)</label>
                    <input type="text" id="memoryTags" placeholder="tag1, tag2, tag3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="hideModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Store</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editMemoryModal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-md bg-white dark:bg-gray-800">
        <div class="mt-3">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white mb-4">Edit Memory</h3>
            <form id="editMemoryForm">
                <input type="hidden" id="editMemoryId">
                <input type="hidden" id="editAssistantId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Content</label>
                    <textarea id="editMemoryContent" rows="6" required class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100"></textarea>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Tags (comma-separated)</label>
                    <input type="text" id="editMemoryTags" placeholder="tag1, tag2, tag3" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="hideEditModal()" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
let allMemories = [];
let allAssistants = [];
let currentViewMode = 'list';
let sortColumn = 'assistant_name';
let sortDirection = 'asc';
let selectedAssistantId = '';
const PAGE_KEY = 'viewmode_memory';

// View Mode Functions
function getViewMode() {
    return localStorage.getItem(PAGE_KEY) || 'list';
}

function setViewMode(mode) {
    currentViewMode = mode;
    localStorage.setItem(PAGE_KEY, mode);
    updateViewModeButtons();
    renderMemories();
}

function updateViewModeButtons() {
    const modes = ['icons', 'list', 'columns', 'gallery'];
    modes.forEach(mode => {
        const btn = document.getElementById(`viewmode-${mode}`);
        if (btn) {
            if (mode === currentViewMode) {
                btn.classList.add('bg-white', 'dark:bg-gray-600', 'shadow-sm');
                btn.classList.remove('hover:bg-gray-200', 'dark:hover:bg-gray-600');
            } else {
                btn.classList.remove('bg-white', 'dark:bg-gray-600', 'shadow-sm');
                btn.classList.add('hover:bg-gray-200', 'dark:hover:bg-gray-600');
            }
        }
    });
}

// Sort Functions
function sortBy(column) {
    if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
    } else {
        sortColumn = column;
        sortDirection = 'asc';
    }
    renderMemories();
}

function getSortIndicator(column) {
    if (sortColumn !== column) return '';
    return sortDirection === 'asc' ? '↑' : '↓';
}

function sortData(data) {
    return [...data].sort((a, b) => {
        let aVal = a[sortColumn];
        let bVal = b[sortColumn];
        
        if (aVal == null) aVal = '';
        if (bVal == null) bVal = '';
        
        // Handle tags - sort by first tag or empty string
        if (sortColumn === 'tags') {
            aVal = (a.tags && a.tags.length > 0) ? a.tags[0] : '';
            bVal = (b.tags && b.tags.length > 0) ? b.tags[0] : '';
        }
        
        const comparison = String(aVal).localeCompare(String(bVal));
        return sortDirection === 'asc' ? comparison : -comparison;
    });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadMemories() {
    const container = document.getElementById('memoriesContainer');
    const spinner = document.getElementById('loadingSpinner');
    const countEl = document.getElementById('memoryCount');
    
    spinner.classList.remove('hidden');
    container.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 dark:border-blue-400"></div><span class="ml-3 text-gray-600 dark:text-gray-400">Loading memories...</span></div>';
    allMemories = [];
    
    try {
        const assistantsRes = await fetch('/api/assistants?limit=10000');
        if (!assistantsRes.ok) {
            throw new Error('Failed to fetch assistants');
        }
        
        const assistantsData = await assistantsRes.json();
        const assistants = assistantsData.data || [];
        
        const cacheAssistantName = "bb_browser_cache";
        const filteredAssistants = assistants.filter(a => a.name !== cacheAssistantName);
        allAssistants = filteredAssistants;
        
        countEl.textContent = `Loading from ${filteredAssistants.length} assistants...`;
        
        const memoryPromises = filteredAssistants.map(async (assistant) => {
            try {
                const memRes = await fetch(`/api/assistants/${assistant.id}/memories`);
                if (memRes.ok) {
                    const memData = await memRes.json();
                    const memories = memData.data || [];
                    return memories.map(m => ({
                        ...m,
                        assistant_id: assistant.id,
                        assistant_name: assistant.name
                    }));
                }
                return [];
            } catch (error) {
                console.error(`Error fetching memories for ${assistant.name}:`, error);
                return [];
            }
        });
        
        let processedCount = 0;
        for (const promise of memoryPromises) {
            const memories = await promise;
            allMemories.push(...memories);
            processedCount++;
            countEl.textContent = `Loaded ${allMemories.length} memories from ${processedCount}/${filteredAssistants.length} assistants...`;
        }
        
        spinner.classList.add('hidden');
        renderMemories();
        
    } catch (error) {
        console.error('Error loading memories:', error);
        spinner.classList.add('hidden');
        countEl.textContent = 'Error loading memories';
        container.innerHTML = '<p class="text-red-500 py-4">Error loading memories. Please try again.</p>';
    }
}

function getFilteredMemories() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    
    let filtered = allMemories.filter(m => {
        if (!searchTerm) return true;
        const contentMatch = m.content?.toLowerCase().includes(searchTerm);
        const tagMatch = m.tags && m.tags.some(t => t.toLowerCase().includes(searchTerm));
        const assistantMatch = m.assistant_name?.toLowerCase().includes(searchTerm);
        return contentMatch || tagMatch || assistantMatch;
    });
    
    return sortData(filtered);
}

function renderMemories() {
    const container = document.getElementById('memoriesContainer');
    const countEl = document.getElementById('memoryCount');
    const filtered = getFilteredMemories();
    
    countEl.textContent = `Showing ${filtered.length} of ${allMemories.length} memories`;

    if (filtered.length === 0) {
        container.innerHTML = '<p class="text-gray-500 dark:text-gray-400 py-4">No memories found</p>';
        return;
    }

    switch (currentViewMode) {
        case 'icons':
            renderIconsView(container, filtered);
            break;
        case 'list':
            renderListView(container, filtered);
            break;
        case 'columns':
            renderColumnsView(container, filtered);
            break;
        case 'gallery':
            renderGalleryView(container, filtered);
            break;
        default:
            renderListView(container, filtered);
    }
}

function renderIconsView(container, data) {
    container.innerHTML = `
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            ${data.map(memory => {
                const contentShort = (memory.content || '').substring(0, 80) + ((memory.content || '').length > 80 ? '...' : '');
                return `
                    <div class="border border-gray-200 dark:border-gray-700 rounded-lg p-4 hover:bg-gray-50 dark:hover:bg-gray-700 hover:shadow-md transition-all cursor-pointer group">
                        <div class="w-10 h-10 mx-auto mb-2 bg-gradient-to-br from-purple-500 to-pink-600 rounded-lg flex items-center justify-center text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                        </div>
                        <p class="text-xs text-blue-600 dark:text-blue-400 text-center truncate">${escapeHtml(memory.assistant_name || 'Unknown')}</p>
                        <p class="text-sm text-gray-700 dark:text-gray-300 mt-2 line-clamp-3">${escapeHtml(contentShort)}</p>
                        ${memory.tags && memory.tags.length > 0 ? `
                            <div class="mt-2 flex flex-wrap gap-1 justify-center">
                                ${memory.tags.slice(0, 2).map(tag => `<span class="px-1.5 py-0.5 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded">${escapeHtml(tag)}</span>`).join('')}
                                ${memory.tags.length > 2 ? `<span class="text-xs text-gray-500">+${memory.tags.length - 2}</span>` : ''}
                            </div>
                        ` : ''}
                        <div class="mt-2 opacity-0 group-hover:opacity-100 transition-opacity flex justify-center gap-1">
                            <button onclick="event.stopPropagation(); showEditModal('${memory.id}', '${memory.assistant_id}')" class="px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
                            <button onclick="event.stopPropagation(); deleteMemory('${memory.id}', '${memory.assistant_id}')" class="px-2 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                        </div>
                    </div>
                `;
            }).join('')}
        </div>
    `;
}

function renderListView(container, data) {
    container.innerHTML = `
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                <thead class="bg-gray-50 dark:bg-gray-900">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('assistant_name')">
                            <div class="flex items-center">Assistant <span class="ml-1">${getSortIndicator('assistant_name')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('content')">
                            <div class="flex items-center">Content <span class="ml-1">${getSortIndicator('content')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 select-none" onclick="sortBy('tags')">
                            <div class="flex items-center">Tags <span class="ml-1">${getSortIndicator('tags')}</span></div>
                        </th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white dark:bg-gray-800 divide-y divide-gray-200 dark:divide-gray-700">
                    ${data.map(memory => {
                        const content = (memory.content || 'No content').substring(0, 200) + ((memory.content || '').length > 200 ? '...' : '');
                        const tags = memory.tags && memory.tags.length > 0 
                            ? memory.tags.map(tag => `<span class="px-2 py-1 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded mr-1">${escapeHtml(tag)}</span>`).join('')
                            : '<span class="text-gray-400 dark:text-gray-500 text-xs">—</span>';
                        
                        return `
                            <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 dark:text-white">${escapeHtml(memory.assistant_name || 'Unknown')}</td>
                                <td class="px-6 py-4 text-sm text-gray-900 dark:text-white max-w-md">
                                    <div class="truncate" title="${escapeHtml(memory.content || '')}">${escapeHtml(content)}</div>
                                </td>
                                <td class="px-6 py-4 text-sm"><div class="flex flex-wrap">${tags}</div></td>
                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-3">
                                    <button onclick="showEditModal('${memory.id}', '${memory.assistant_id}')" class="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300">Edit</button>
                                    <button onclick="deleteMemory('${memory.id}', '${memory.assistant_id}')" class="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300">Delete</button>
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;
}

function renderColumnsView(container, data) {
    const assistantGroups = {};
    data.forEach(memory => {
        const assistantId = memory.assistant_id || 'unknown';
        const assistantName = memory.assistant_name || 'Unknown';
        if (!assistantGroups[assistantId]) {
            assistantGroups[assistantId] = { name: assistantName, memories: [] };
        }
        assistantGroups[assistantId].memories.push(memory);
    });
    
    const sortedAssistantIds = Object.keys(assistantGroups).sort((a, b) => 
        assistantGroups[a].name.localeCompare(assistantGroups[b].name)
    );
    
    container.innerHTML = `
        <div class="flex border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden" style="height: 500px;">
            <!-- Assistants Column -->
            <div class="w-48 flex-shrink-0 bg-gray-50 dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700 overflow-y-auto">
                <div class="p-2 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700">Assistants</div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    <div onclick="selectColumnAssistant('')" class="px-3 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${selectedAssistantId === '' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}">
                        <div class="flex justify-between items-center">
                            <span>All Assistants</span>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${data.length}</span>
                        </div>
                    </div>
                    ${sortedAssistantIds.map(id => `
                        <div onclick="selectColumnAssistant('${id}')" class="px-3 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 ${selectedAssistantId === id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'text-gray-700 dark:text-gray-300'}">
                            <div class="flex justify-between items-center">
                                <span class="truncate">${escapeHtml(assistantGroups[id].name)}</span>
                                <span class="text-xs text-gray-500 dark:text-gray-400">${assistantGroups[id].memories.length}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
            <!-- Memories Column -->
            <div class="flex-1 overflow-y-auto">
                <div class="p-2 text-xs font-medium text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900">Memories</div>
                <div class="divide-y divide-gray-200 dark:divide-gray-700">
                    ${(selectedAssistantId ? assistantGroups[selectedAssistantId]?.memories || [] : data).map(memory => {
                        const contentShort = (memory.content || '').substring(0, 100) + ((memory.content || '').length > 100 ? '...' : '');
                        return `
                            <div class="px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700 group">
                                <div class="flex items-start justify-between">
                                    <div class="flex-1 min-w-0">
                                        <p class="text-sm text-gray-900 dark:text-white">${escapeHtml(contentShort)}</p>
                                        ${memory.tags && memory.tags.length > 0 ? `
                                            <div class="mt-1 flex flex-wrap gap-1">
                                                ${memory.tags.map(tag => `<span class="px-1.5 py-0.5 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded">${escapeHtml(tag)}</span>`).join('')}
                                            </div>
                                        ` : ''}
                                    </div>
                                    <div class="flex gap-1 ml-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onclick="showEditModal('${memory.id}', '${memory.assistant_id}')" class="px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
                                        <button onclick="deleteMemory('${memory.id}', '${memory.assistant_id}')" class="px-2 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        </div>
    `;
}

function selectColumnAssistant(id) {
    selectedAssistantId = id;
    renderMemories();
}

function renderGalleryView(container, data) {
    container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            ${data.map(memory => `
                <div class="border border-gray-200 dark:border-gray-700 rounded-lg overflow-hidden hover:shadow-lg transition-shadow">
                    <div class="h-16 bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    </div>
                    <div class="p-4">
                        <p class="text-sm text-blue-600 dark:text-blue-400 font-medium">${escapeHtml(memory.assistant_name || 'Unknown')}</p>
                        <p class="text-sm text-gray-700 dark:text-gray-300 mt-2 whitespace-pre-wrap line-clamp-4">${escapeHtml(memory.content || 'No content')}</p>
                        ${memory.tags && memory.tags.length > 0 ? `
                            <div class="mt-3 flex flex-wrap gap-1">
                                ${memory.tags.map(tag => `<span class="px-2 py-0.5 text-xs bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded">${escapeHtml(tag)}</span>`).join('')}
                            </div>
                        ` : ''}
                        <div class="mt-4 flex justify-end gap-2">
                            <button onclick="showEditModal('${memory.id}', '${memory.assistant_id}')" class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Edit</button>
                            <button onclick="deleteMemory('${memory.id}', '${memory.assistant_id}')" class="px-3 py-1 text-sm bg-red-600 text-white rounded hover:bg-red-700">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

function showCreateModal() {
    document.getElementById('memoryForm').reset();
    document.getElementById('memoryModal').classList.remove('hidden');
}

function hideModal() {
    document.getElementById('memoryModal').classList.add('hidden');
}

function showEditModal(memoryId, assistantId) {
    const memory = allMemories.find(m => m.id === memoryId && m.assistant_id === assistantId);
    if (!memory) {
        alert('Memory not found');
        return;
    }
    
    document.getElementById('editMemoryId').value = memoryId;
    document.getElementById('editAssistantId').value = assistantId;
    document.getElementById('editMemoryContent').value = memory.content || '';
    document.getElementById('editMemoryTags').value = memory.tags ? memory.tags.join(', ') : '';
    document.getElementById('editMemoryModal').classList.remove('hidden');
}

function hideEditModal() {
    document.getElementById('editMemoryModal').classList.add('hidden');
}

document.getElementById('editMemoryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const memoryId = document.getElementById('editMemoryId').value;
    const assistantId = document.getElementById('editAssistantId').value;
    const tags = document.getElementById('editMemoryTags').value
        .split(',')
        .map(t => t.trim())
        .filter(t => t);

    const data = {
        content: document.getElementById('editMemoryContent').value,
        tags: tags.length > 0 ? tags : undefined,
        assistant_id: assistantId
    };

    try {
        const response = await fetch(`/api/memory/${memoryId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (response.ok) {
            hideEditModal();
            loadMemories();
        } else {
            const error = await response.json();
            alert(error.error || 'Failed to update memory');
        }
    } catch (error) {
        console.error('Error updating memory:', error);
        alert('Error updating memory');
    }
});

async function deleteMemory(id, assistantId) {
    if (!confirm('Are you sure you want to delete this memory?')) return;
    
    if (!assistantId) {
        alert('Cannot delete: assistant ID missing');
        return;
    }
    
    try {
        const response = await fetch(`/api/memory/${id}?assistant_id=${assistantId}`, {method: 'DELETE'});
        if (response.ok) {
            allMemories = allMemories.filter(m => m.id !== id);
            renderMemories();
        } else {
            alert('Failed to delete memory');
        }
    } catch (error) {
        console.error('Error deleting memory:', error);
        alert('Error deleting memory');
    }
}

document.getElementById('memoryForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const tags = document.getElementById('memoryTags').value
        .split(',')
        .map(t => t.trim())
        .filter(t => t);

    const data = {
        content: document.getElementById('memoryContent').value,
        tags: tags.length > 0 ? tags : undefined
    };

    try {
        const response = await fetch('/api/memory', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if (response.ok) {
            hideModal();
            loadMemories();
        } else {
            const error = await response.json();
            alert(error.error || 'Failed to store memory');
        }
    } catch (error) {
        console.error('Error storing memory:', error);
        alert('Error storing memory');
    }
});

document.getElementById('searchInput').addEventListener('input', renderMemories);

// Initialize
currentViewMode = getViewMode();
updateViewModeButtons();
loadMemories();
</script>
{% endblock %}
